<!-- Top App Bar (Shared Component Strategy) -->
<header class="flex justify-between items-center w-full px-4 h-16 bg-[#0A0A0A] border-b-2 border-white/10">
<button class="text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[#22C55E]">arrow_back</span>
</button>
<h1 class="font-lexend font-black uppercase tracking-tighter text-xl text-white italic">EL FULBO</h1>
<div class="w-6"></div> <!-- Spacer for symmetry -->
</header>
<!-- Header Titles -->
<section class="px-6 pt-6">
<h2 class="font-headline-lg text-white uppercase italic leading-none">CREÁ TU JUGADOR</h2>
<p class="font-label-mono text-primary uppercase mt-1">Contanos cómo jugás</p>
</section>
<!-- Main Content: FIFA-Inspired Player Card -->
<section class="flex-grow flex flex-col items-center justify-center px-6">
<div class="relative w-full max-w-[260px] aspect-[2/3] bg-[#1A1A1A] border-2 border-[#D4AF37]/40 rounded-lg gold-glow overflow-hidden flex flex-col">
<!-- Card Texture/Overlay -->
<div class="absolute inset-0 opacity-20 pointer-events-none bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-[#D4AF37] via-transparent to-transparent"></div>

<div class="flex flex-col items-center border-r border-white/20 pr-3">

<span class="font-label-mono text-white/60">MC</span>

</div>
</div>

</div>

<span class="font-label-mono text-white/40 text-[10px]">RIT</span>
</div>

</div>

<span class="font-label-bold text-white">75</span>

</div>

<div class="bg-[#1A1A1A] border border-white/10 divide-y divide-white/5">

<span class="font-label-mono text-white/60 text-[11px] uppercase">Posición</span>

<div class="p-4">

<div class="relative h-1 w-full bg-white/10">

<div class="absolute top-1/2 left-3/4 -translate-x-1/2 -translate-y-1/2 w-4 h-4 bg-white border-2 border-primary rounded-full"></div>
</div>
</div>
</div>
</section>

<button class="w-full bg-primary py-4 text-black font-headline-md uppercase italic tracking-tight active:scale-[0.98] transition-transform">
                GUARDAR JUGADOR
