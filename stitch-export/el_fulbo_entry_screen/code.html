<!-- Status Bar Space -->
<header class="flex justify-between items-center py-4 w-full opacity-60">
<span class="text-label-mono font-bold">21:45</span>
<div class="flex gap-2">
<span class="material-symbols-outlined !text-[14px]">signal_cellular_alt</span>
<span class="material-symbols-outlined !text-[14px]">wifi</span>
<span class="material-symbols-outlined !text-[14px]">battery_full</span>
</div>
</header>
<!-- Brand Identity / Center Section -->
<section class="flex-grow flex flex-col justify-center items-center text-center space-y-stack-md pt-stack-lg">
<div class="flex flex-col items-center">
<h1 class="flex flex-col leading-[0.85] font-headline-xl uppercase">
<span class="text-white text-[42px] tracking-tight font-black logo-shadow">EL</span>
<span class="text-primary text-[82px] tracking-tighter font-black italic logo-shadow">FULBO</span>
</h1>
<p class="mt-stack-sm text-white font-headline-md max-w-[240px] leading-tight">

</p>
</div>
</section>

<button class="w-full h-16 bg-primary-container text-black font-headline-md flex items-center justify-center gap-2 active:scale-95 transition-transform border-none">

<p class="font-label-mono text-white/40 uppercase tracking-[0.2em] text-[10px]">
                    Hecho para el fulbito de siempre.
                </p>
</footer>
</section>
</main>

<style>
        body { touch-action: none; overflow: hidden; }
