        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background: linear-gradient(to bottom, rgba(19, 19, 19, 0.85) 0%, rgba(19, 19, 19, 0.98) 100%);
        }

            border: 1px solid rgba(255, 255, 255, 0.1);
        }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md overflow-hidden h-screen flex flex-col">

<div class="fixed inset-0 z-[-1]">
<img class="w-full h-full object-cover" data-alt="A cinematic low-angle shot of a urban soccer field at night under bright stadium floodlights that pierce through a light evening mist. The dark green grass is textured and sharp, contrasting with the surrounding city concrete and deep black shadows. The mood is aggressive and competitive, styled with high-contrast brutalist aesthetics using a palette of deep blacks and vibrant neon green accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHMqz1APzLOtW_iX0cL-h8ZVjRkXewTHONutgoB-WlHsBl4nQnk6Zkqg5cJrU8IN5N7FTT0hneJKYuxbHZlZEwruIAT8datZRCNoCralbp7x7KdI2uzWWsrP3iHXeQZH6nfWI2cI0RO3GR9kFR4rsv_q69SSf-PJAMhKkwG1VNtE9rqSM6xhlYez_paCWbVFjoiU9SKuhbzqJeB8paPJX0-ORC9piRf75Kt176F5YaiFMazBG0Am2NgFSmltdDSSuTrN-olf8sCwQ"/>
<div class="absolute inset-0 pitch-overlay"></div>
</div>
<!-- TopAppBar -->
<header class="bg-neutral-950 flex justify-between items-center w-full px-4 h-16 border-b-2 border-white/10 shrink-0">
<div class="flex items-center gap-4">
<button class="text-green-500 active:bg-green-500 active:text-black transition-colors duration-100 p-1">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Lexend'] uppercase tracking-tight font-black text-lg text-green-500">MEMORIA DEL GRUPO</h1>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Navigation Tabs -->
<nav class="flex w-full bg-neutral-950 shrink-0">
<button class="flex-1 py-4 text-green-500 border-b-2 border-green-500 font-['Lexend'] uppercase font-bold text-[10px] tracking-widest">
            PARTIDOS
        </button>
<button class="flex-1 py-4 text-neutral-400 hover:bg-neutral-900 font-['Lexend'] uppercase font-bold text-[10px] tracking-widest">
            ESTADÍSTICAS
        </button>
</nav>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto p-gutter flex flex-col items-center">
<!-- Scoreboard Title Anchor -->
<div class="w-full text-center mb-stack-lg mt-unit">
<span class="font-label-mono text-primary uppercase mb-stack-xs block">Historial Reciente</span>
<h2 class="font-headline-xl text-on-background uppercase italic tracking-tighter">EL FULBO</h2>
</div>
<!-- Matches Card -->
<div class="w-full max-w-md bg-surface-container-low brutalist-border rounded-lg overflow-hidden flex flex-col mb-stack-md">
<!-- Match Item 1 -->
<div class="flex items-center justify-between p-stack-md border-b border-white/5 hover:bg-neutral-900/50 transition-colors">
<div class="flex flex-col">
<span class="font-label-mono text-neutral-500 mb-1">17/05</span>
<span class="font-headline-md text-on-background uppercase">vs. Los Cruzados</span>
</div>
<div class="flex flex-col items-end">
<span class="font-headline-md text-primary font-black tracking-widest">5 - 4</span>
<span class="font-label-bold text-primary">(W)</span>
</div>
</div>
<!-- Match Item 2 -->
<div class="flex items-center justify-between p-stack-md border-b border-white/5 hover:bg-neutral-900/50 transition-colors">
<div class="flex flex-col">
<span class="font-label-mono text-neutral-500 mb-1">10/05</span>
<span class="font-headline-md text-on-background uppercase">vs. La Banda del Pepe</span>
</div>
<div class="flex flex-col items-end">
<span class="font-headline-md text-primary font-black tracking-widest">6 - 2</span>
<span class="font-label-bold text-primary">(W)</span>
</div>
</div>
<!-- Match Item 3 -->
<div class="flex items-center justify-between p-stack-md border-b border-white/5 hover:bg-neutral-900/50 transition-colors">
<div class="flex flex-col">
<span class="font-label-mono text-neutral-500 mb-1">03/05</span>
<span class="font-headline-md text-on-background uppercase">vs. Los del Barrio</span>
</div>
<div class="flex flex-col items-end">
<span class="font-headline-md text-neutral-400 font-black tracking-widest">3 - 3</span>
<span class="font-label-bold text-neutral-500">(E)</span>
</div>
</div>
<!-- Match Item 4 -->
<div class="flex items-center justify-between p-stack-md hover:bg-neutral-900/50 transition-colors">
<div class="flex flex-col">
<span class="font-label-mono text-neutral-500 mb-1">26/04</span>
<span class="font-headline-md text-on-background uppercase">vs. Villa United</span>
</div>
<div class="flex flex-col items-end">
<span class="font-headline-md text-primary font-black tracking-widest">2 - 1</span>
<span class="font-label-bold text-primary">(W)</span>
</div>
</div>
</div>
<!-- Secondary Action -->
<button class="w-full max-w-md py-4 border-2 border-neutral-700 text-on-background font-label-bold uppercase tracking-widest hover:border-white transition-colors active:scale-95 duration-150">
            VER MÁS HISTORIAL
        </button>
</main>

<footer class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 pb-safe bg-neutral-950 border-t-2 border-white/10 z-50">

<span class="material-symbols-outlined">sports_soccer</span>
<span class="font-['Lexend'] uppercase font-bold text-[10px] tracking-widest mt-1">MATCHES</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-500 pt-2 flex-1 h-full hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">groups</span>
<span class="font-['Lexend'] uppercase font-bold text-[10px] tracking-widest mt-1">GROUPS</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-500 pt-2 flex-1 h-full hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-['Lexend'] uppercase font-bold text-[10px] tracking-widest mt-1">STATS</span>
</a>
<a class="flex flex-col items-center justify-center text-neutral-500 pt-2 flex-1 h-full hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-['Lexend'] uppercase font-bold text-[10px] tracking-widest mt-1">PROFILE</span>
</a>
